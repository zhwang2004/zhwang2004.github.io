# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Ziheng Wang / Personal Site"
title_separator          : "-"
name                     : "Ziheng Wang"
description              : "Personal website showcasing research, projects, and academic achievements"
url                      : https://zhwang2004.github.io # the base hostname & protocol for your site e.g. "https://[your GitHub username].github.io"
baseurl                  : "" # the subpath of your site, e.g. "/blog"
repository               : "zhwang2004/zhwang2004.github.io"

# Site Author
author:
  avatar           : "profile.png"
  name             : "Ziheng Wang"
  pronouns         : "he/him"
  bio              : "Ziheng Wang is a student at Nanjing University of Information Science and Technology specializing in Internet of Things. His research interests include artificial intelligence, multi-modal learning, and UAV intelligent perception."
  location         : "Nanjing, China"
  employer         : "Nanjing University of Information Science and Technology"
  uri              : https://www.nuist.edu.cn
  email            : "zhwang@nuist.edu.cn"
  googlescholar    : "https://scholar.google.com/citations?user=QrHma30AAAAJ"
  orcid            : "http://orcid.org/0000-0001-2345-6789"
  pubmed           : "https://www.ncbi.nlm.nih.gov/pubmed/?term=Ziheng+Wang"
  github           : "https://github.com/Nickory"
  linkedin         : "https://www.linkedin.com/in/zihengwang"
  twitter          : "https://twitter.com/ZihengWang"

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   : "500x300.png"  # Set default image for teaser
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : true
comments:
  provider               : "disqus"
  disqus:
    shortname            : "zihengwang"

# SEO Related
google_site_verification : "your-google-verification-code"
bing_site_verification   : "your-bing-verification-code"
alexa_site_verification  : "your-alexa-verification-code"
yandex_site_verification : "your-yandex-verification-code"

# Social Sharing
twitter:
  username               : "ZihengWang"
facebook:
  username               : "ZihengWang"
  app_id                 : "your-facebook-app-id"
og_image                 : "images/og_image.png"

# Analytics
analytics:
  provider               : "google"
  google:
    tracking_id          : "UA-XXXXXX-X"

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collection settings
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
